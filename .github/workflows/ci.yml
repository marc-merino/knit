name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to keep the queue short.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Style gate: rustfmt defaults, no local overrides. Clippy is advisory and
  # intentionally not gated here.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # Primary supported platform: full build + test suite.
  linux:
    name: Linux (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --all-targets
      - name: cargo test
        run: cargo test --no-fail-fast

  # macOS is the primary development platform, but CI coverage matters for
  # contributors and because APFS is case-insensitive by default — closer to
  # Windows than Linux for path-identity behavior.
  macos:
    name: macOS (build + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --all-targets
      - name: cargo test
        run: cargo test --no-fail-fast

  # Windows support status lives in docs/windows.md. The fixtures are
  # cross-platform: fake forge CLIs are sh scripts launched through .cmd shims
  # (Git for Windows provides sh on the runners), and the GitHub API transport
  # is exercised against a local HTTP stub.
  windows:
    name: Windows (build + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --all-targets
      - name: cargo test
        run: cargo test --no-fail-fast
